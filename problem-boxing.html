<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE PROBLEM CHILD — Boxing Game</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700;900&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a0a;
  font-family:'Barlow Condensed',sans-serif;
  overflow:hidden;
  height:100vh;
  width:100vw;
  cursor:none;
}

/* CUSTOM CURSOR */
#cursor {
  position:fixed;
  width:40px; height:40px;
  font-size:28px;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  transition:transform 0.05s;
  user-select:none;
}

/* SCREENS */
.screen { position:absolute; inset:0; display:none; }
.screen.active { display:flex; }

/* ══════════════════════════════
   MENU SCREEN
══════════════════════════════ */
#menu {
  background:
    radial-gradient(ellipse 80% 60% at 50% 40%, rgba(220,50,0,0.3) 0%, transparent 70%),
    linear-gradient(160deg, #0a0000 0%, #000 50%, #050208 100%);
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.menu-ropes {
  position:absolute;
  top:0; left:0; right:0;
  height:100%;
  pointer-events:none;
  overflow:hidden;
}
.rope {
  position:absolute;
  left:0; right:0;
  height:4px;
  border-radius:2px;
}
.rope-1 { top:18%; background:linear-gradient(90deg, transparent, #CC2200 10%, #FF4400 50%, #CC2200 90%, transparent); box-shadow:0 0 12px rgba(255,50,0,0.5); }
.rope-2 { top:36%; background:linear-gradient(90deg, transparent, #AA1800 10%, #DD3300 50%, #AA1800 90%, transparent); box-shadow:0 0 8px rgba(200,30,0,0.4); }
.rope-3 { top:54%; background:linear-gradient(90deg, transparent, #CC2200 10%, #FF4400 50%, #CC2200 90%, transparent); box-shadow:0 0 12px rgba(255,50,0,0.5); }
.rope-4 { top:72%; background:linear-gradient(90deg, transparent, #AA1800 10%, #DD3300 50%, #AA1800 90%, transparent); }

.spotlight-left {
  position:absolute; top:-100px; left:-100px;
  width:600px; height:600px;
  background:conic-gradient(from 100deg at 0% 0%, transparent 0deg, rgba(255,200,0,0.08) 15deg, transparent 30deg);
  pointer-events:none;
}
.spotlight-right {
  position:absolute; top:-100px; right:-100px;
  width:600px; height:600px;
  background:conic-gradient(from 250deg at 100% 0%, transparent 0deg, rgba(255,200,0,0.08) 15deg, transparent 30deg);
  pointer-events:none;
}

.menu-gloves {
  font-size:clamp(60px,12vw,120px);
  margin-bottom:10px;
  animation:glovesFace 2s ease-in-out infinite;
  filter:drop-shadow(0 0 30px rgba(255,50,0,0.7));
}
@keyframes glovesFace {
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.06); filter:drop-shadow(0 0 50px rgba(255,80,0,1)); }
}

.menu-eyebrow {
  font-family:'Oswald',sans-serif;
  font-size:clamp(10px,2vw,15px);
  letter-spacing:8px;
  color:rgba(255,80,0,0.8);
  text-transform:uppercase;
  margin-bottom:8px;
}
.menu-title {
  font-family:'Bebas Neue',cursive;
  font-size:clamp(52px,12vw,130px);
  line-height:0.85;
  color:#fff;
  text-shadow:
    0 0 60px rgba(255,50,0,0.8),
    0 0 120px rgba(255,80,0,0.4),
    6px 6px 0 #8B0000,
    12px 12px 0 rgba(0,0,0,0.5);
  letter-spacing:4px;
  margin-bottom:6px;
}
.menu-title .red { color:#FF3300; }
.menu-title .gold { color:#FFD700; text-shadow:0 0 40px rgba(255,215,0,0.8), 4px 4px 0 #6B4400; }

.menu-sub {
  font-size:clamp(12px,2.5vw,18px);
  letter-spacing:6px;
  color:rgba(255,255,255,0.4);
  text-transform:uppercase;
  margin-bottom:50px;
}

.btn-start {
  font-family:'Bebas Neue',cursive;
  font-size:clamp(20px,4vw,32px);
  letter-spacing:6px;
  color:#000;
  background:linear-gradient(135deg, #FFD700, #FF8C00, #FFD700);
  background-size:200% auto;
  border:none; outline:none;
  padding:16px 60px;
  border-radius:4px;
  cursor:pointer;
  position:relative;
  box-shadow:0 0 30px rgba(255,180,0,0.6), 0 0 60px rgba(255,100,0,0.3);
  animation:btnPulse 1.5s ease-in-out infinite;
  transition:transform 0.1s;
  text-transform:uppercase;
}
.btn-start:hover { transform:scale(1.06); }
.btn-start:active { transform:scale(0.97); }
@keyframes btnPulse {
  0%,100%{ box-shadow:0 0 30px rgba(255,180,0,0.6), 0 0 60px rgba(255,100,0,0.3); }
  50%{ box-shadow:0 0 50px rgba(255,200,0,0.9), 0 0 100px rgba(255,120,0,0.5); }
}

.menu-controls {
  margin-top:30px;
  display:flex; gap:30px; justify-content:center; flex-wrap:wrap;
}
.ctrl-item {
  display:flex; align-items:center; gap:8px;
  font-size:13px; letter-spacing:3px;
  color:rgba(255,255,255,0.3); text-transform:uppercase;
}
.ctrl-key {
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:4px; padding:4px 10px;
  font-family:'Bebas Neue',cursive;
  font-size:14px; color:rgba(255,255,255,0.6);
}

/* ══════════════════════════════
   GAME SCREEN
══════════════════════════════ */
#game {
  flex-direction:column;
  background:#000;
  position:relative;
}

/* HUD */
#hud {
  position:absolute; top:0; left:0; right:0;
  height:70px;
  background:linear-gradient(180deg, rgba(0,0,0,0.95), transparent);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
  z-index:100;
}
.hud-player {
  display:flex; flex-direction:column; gap:4px; min-width:200px;
}
.hud-player.right { align-items:flex-end; }
.hud-name {
  font-family:'Bebas Neue',cursive;
  font-size:clamp(14px,2.5vw,22px);
  letter-spacing:3px; color:#fff;
}
.health-bar-wrap {
  width:clamp(140px,20vw,240px); height:14px;
  background:rgba(255,255,255,0.1);
  border-radius:2px; overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
}
.health-bar {
  height:100%;
  border-radius:2px;
  transition:width 0.3s ease;
}
.health-bar.player { background:linear-gradient(90deg, #00CC44, #00FF66); }
.health-bar.enemy  { background:linear-gradient(90deg, #FF3300, #FF6600); }

.hud-center {
  text-align:center; flex:1; padding:0 10px;
}
.round-display {
  font-family:'Bebas Neue',cursive;
  font-size:clamp(20px,4vw,38px);
  color:#FFD700;
  text-shadow:0 0 20px rgba(255,215,0,0.6);
  letter-spacing:4px;
  line-height:1;
}
.timer-display {
  font-family:'Oswald',sans-serif;
  font-size:clamp(10px,1.5vw,14px);
  letter-spacing:4px; color:rgba(255,255,255,0.5);
}

#score-display {
  position:absolute; top:70px; left:50%; transform:translateX(-50%);
  font-family:'Bebas Neue',cursive;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:4px; color:rgba(255,215,0,0.7);
  z-index:100;
}

/* ARENA */
#arena {
  position:absolute;
  inset:0;
  overflow:hidden;
}

/* Canvas background */
.ring-floor {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 70% 40% at 50% 90%, rgba(180,140,80,0.15) 0%, transparent 60%),
    linear-gradient(180deg, #1a0a00 0%, #0d0600 40%, #050300 100%);
}
.ring-canvas {
  position:absolute; inset:0;
}

/* Crowd noise atmosphere */
.crowd-bg {
  position:absolute; bottom:0; left:0; right:0; height:35%;
  background:linear-gradient(0deg,
    rgba(255,50,0,0.05) 0%,
    transparent 100%);
  pointer-events:none;
}

/* Spotlights */
.arena-spot {
  position:absolute; top:-50px;
  width:400px; height:600px;
  border-radius:50%;
  pointer-events:none;
  opacity:0.06;
}
.arena-spot-l { left:-100px; background:radial-gradient(ellipse, #fff 0%, transparent 70%); animation:spotSwing 4s ease-in-out infinite; }
.arena-spot-r { right:-100px; background:radial-gradient(ellipse, #fff 0%, transparent 70%); animation:spotSwing 4s ease-in-out infinite reverse; }
@keyframes spotSwing {
  0%,100%{ transform:rotate(-10deg); }
  50%{ transform:rotate(10deg); }
}

/* FIGHTERS */
.fighter {
  position:absolute;
  bottom:20%;
  display:flex; flex-direction:column; align-items:center;
  user-select:none;
  transition:left 0.05s, right 0.05s;
}

#player { left:15%; }
#enemy  { right:15%; }

.fighter-sprite {
  font-size:clamp(60px,10vw,100px);
  line-height:1;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,0.8));
  transition:transform 0.08s;
}
#player .fighter-sprite { transform:scaleX(1); }
#enemy  .fighter-sprite { transform:scaleX(-1); }

.fighter-shadow {
  width:80px; height:16px;
  background:radial-gradient(ellipse, rgba(0,0,0,0.6), transparent);
  margin-top:-6px;
  border-radius:50%;
}

/* RING ROPES */
.ring-rope {
  position:absolute;
  left:5%; right:5%;
  height:5px; border-radius:3px;
  pointer-events:none;
}
.ring-rope-1 { top:30%; background:linear-gradient(90deg,transparent,#CC2200,#FF4400,#CC2200,transparent); box-shadow:0 0 10px rgba(255,50,0,0.5); }
.ring-rope-2 { top:42%; background:linear-gradient(90deg,transparent,#AA1800,#DD3300,#AA1800,transparent); }
.ring-rope-3 { top:54%; background:linear-gradient(90deg,transparent,#CC2200,#FF4400,#CC2200,transparent); box-shadow:0 0 10px rgba(255,50,0,0.4); }
.ring-post {
  position:absolute;
  width:18px;
  background:linear-gradient(180deg,#888,#444,#222);
  border-radius:4px;
  top:28%; bottom:20%;
  box-shadow:2px 0 8px rgba(0,0,0,0.8);
}
.ring-post-l { left:5%; }
.ring-post-r { right:5%; }

/* FLOOR MAT */
.ring-mat {
  position:absolute;
  bottom:18%; left:5%; right:5%; height:5px;
  background:linear-gradient(90deg, transparent, rgba(200,160,80,0.3), transparent);
  border-radius:50%;
}

/* HIT EFFECT */
.hit-effect {
  position:absolute;
  pointer-events:none;
  font-size:clamp(24px,5vw,48px);
  font-family:'Bebas Neue',cursive;
  font-weight:900;
  text-shadow:2px 2px 0 rgba(0,0,0,0.5);
  animation:hitFloat 0.6s ease-out forwards;
  z-index:200;
  user-select:none;
}
@keyframes hitFloat {
  0%  { opacity:1; transform:translate(-50%,-50%) scale(0.5); }
  40% { opacity:1; transform:translate(-50%,-110%) scale(1.2); }
  100%{ opacity:0; transform:translate(-50%,-180%) scale(0.8); }
}

/* KO FLASH */
#ko-flash {
  position:absolute; inset:0;
  background:white; opacity:0;
  pointer-events:none; z-index:300;
  transition:opacity 0.1s;
}

/* COMBO DISPLAY */
#combo-display {
  position:absolute; top:80px; left:20px;
  z-index:101; pointer-events:none;
}
.combo-text {
  font-family:'Bebas Neue',cursive;
  font-size:clamp(20px,4vw,42px);
  color:#FF6600;
  text-shadow:0 0 20px rgba(255,100,0,0.8), 2px 2px 0 #000;
  letter-spacing:3px;
  animation:comboAnim 0.3s ease both;
}
@keyframes comboAnim {
  from{ transform:scale(0.5) rotate(-5deg); opacity:0; }
  to  { transform:scale(1) rotate(0deg); opacity:1; }
}

/* STAMINA BAR */
#stamina-wrap {
  position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
  z-index:101; text-align:center;
}
.stamina-label {
  font-family:'Oswald',sans-serif;
  font-size:10px; letter-spacing:4px; color:rgba(255,215,0,0.5);
  text-transform:uppercase; margin-bottom:3px;
}
.stamina-bar-wrap {
  width:160px; height:8px;
  background:rgba(255,255,255,0.08);
  border-radius:4px; overflow:hidden;
  border:1px solid rgba(255,215,0,0.2);
}
#stamina-bar {
  height:100%; width:100%;
  background:linear-gradient(90deg,#FFD700,#FF8C00);
  border-radius:4px;
  transition:width 0.1s;
}

/* ══════════════════════════════
   ROUND ANNOUNCE
══════════════════════════════ */
#round-announce {
  position:absolute; inset:0;
  display:none; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.7);
  z-index:400;
}
#round-announce.show { display:flex; }
.announce-text {
  font-family:'Bebas Neue',cursive;
  font-size:clamp(60px,15vw,160px);
  color:#FFD700;
  text-shadow:
    0 0 60px rgba(255,215,0,1),
    0 0 120px rgba(255,150,0,0.8),
    8px 8px 0 #8B6400;
  letter-spacing:6px;
  animation:announceIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes announceIn {
  from{ transform:scale(0.3); opacity:0; }
  to  { transform:scale(1); opacity:1; }
}

/* ══════════════════════════════
   GAME OVER SCREEN
══════════════════════════════ */
#gameover {
  background:
    radial-gradient(ellipse 60% 60% at 50% 50%, rgba(180,0,0,0.4) 0%, transparent 70%),
    #000;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  z-index:500;
}
.go-icon { font-size:80px; margin-bottom:16px; }
.go-result {
  font-family:'Bebas Neue',cursive;
  font-size:clamp(50px,12vw,120px);
  letter-spacing:6px;
  text-shadow:6px 6px 0 rgba(0,0,0,0.5);
  margin-bottom:8px;
  line-height:1;
}
.go-result.win { color:#FFD700; text-shadow:0 0 60px rgba(255,215,0,0.8), 6px 6px 0 #8B6400; }
.go-result.lose { color:#FF3300; text-shadow:0 0 60px rgba(255,50,0,0.8), 6px 6px 0 #8B0000; }
.go-score {
  font-family:'Oswald',sans-serif;
  font-size:clamp(14px,3vw,24px);
  letter-spacing:6px; color:rgba(255,255,255,0.6);
  text-transform:uppercase; margin-bottom:40px;
}
.go-score span { color:#FFD700; font-size:1.4em; }
.btn-restart {
  font-family:'Bebas Neue',cursive;
  font-size:clamp(18px,3vw,28px);
  letter-spacing:5px; color:#000;
  background:linear-gradient(135deg,#FFD700,#FF8C00);
  border:none; outline:none; cursor:pointer;
  padding:14px 50px; border-radius:4px;
  box-shadow:0 0 30px rgba(255,180,0,0.5);
  transition:transform 0.1s, box-shadow 0.1s;
}
.btn-restart:hover { transform:scale(1.05); box-shadow:0 0 50px rgba(255,200,0,0.8); }
</style>
</head>
<body>

<div id="cursor">🥊</div>

<!-- ══ MENU ══ -->
<div id="menu" class="screen active">
  <div class="menu-ropes">
    <div class="rope rope-1"></div>
    <div class="rope rope-2"></div>
    <div class="rope rope-3"></div>
    <div class="rope rope-4"></div>
  </div>
  <div class="spotlight-left"></div>
  <div class="spotlight-right"></div>
  <div class="menu-gloves">🥊🥊</div>
  <div class="menu-eyebrow">The Problem Child Presents</div>
  <h1 class="menu-title">
    <span class="red">PROBLEM</span><br>
    <span class="gold">BOXING</span>
  </h1>
  <div class="menu-sub">Street Certified · Ring Verified</div>
  <button class="btn-start" id="btn-start">FIGHT NOW</button>
  <div class="menu-controls">
    <div class="ctrl-item"><span class="ctrl-key">A / ←</span> Move Left</div>
    <div class="ctrl-item"><span class="ctrl-key">D / →</span> Move Right</div>
    <div class="ctrl-item"><span class="ctrl-key">J</span> Jab</div>
    <div class="ctrl-item"><span class="ctrl-key">K</span> Hook</div>
    <div class="ctrl-item"><span class="ctrl-key">L</span> Uppercut</div>
    <div class="ctrl-item"><span class="ctrl-key">SPACE</span> Block</div>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="game" class="screen">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-player">
      <div class="hud-name">🥊 THE PROBLEM CHILD</div>
      <div class="health-bar-wrap">
        <div class="health-bar player" id="player-health-bar"></div>
      </div>
    </div>
    <div class="hud-center">
      <div class="round-display" id="round-display">ROUND 1</div>
      <div class="timer-display" id="timer-display">1:00</div>
    </div>
    <div class="hud-player right">
      <div class="hud-name">OPPONENT 🤜</div>
      <div class="health-bar-wrap">
        <div class="health-bar enemy" id="enemy-health-bar" style="float:right"></div>
      </div>
    </div>
  </div>

  <div id="score-display">SCORE: <span id="score-val">0</span></div>
  <div id="combo-display"></div>

  <!-- ARENA -->
  <div id="arena">
    <div class="ring-floor"></div>
    <canvas class="ring-canvas" id="ring-canvas"></canvas>
    <div class="arena-spot arena-spot-l"></div>
    <div class="arena-spot arena-spot-r"></div>
    <div class="crowd-bg"></div>

    <!-- Ring structure -->
    <div class="ring-post ring-post-l"></div>
    <div class="ring-post ring-post-r"></div>
    <div class="ring-rope ring-rope-1"></div>
    <div class="ring-rope ring-rope-2"></div>
    <div class="ring-rope ring-rope-3"></div>
    <div class="ring-mat"></div>

    <!-- Fighters -->
    <div class="fighter" id="player">
      <div class="fighter-sprite" id="player-sprite">🥊</div>
      <div class="fighter-shadow"></div>
    </div>
    <div class="fighter" id="enemy">
      <div class="fighter-sprite" id="enemy-sprite">🤜</div>
      <div class="fighter-shadow"></div>
    </div>
  </div>

  <!-- Stamina -->
  <div id="stamina-wrap">
    <div class="stamina-label">Stamina</div>
    <div class="stamina-bar-wrap"><div id="stamina-bar"></div></div>
  </div>

  <div id="ko-flash"></div>
</div>

<!-- ══ ROUND ANNOUNCE ══ -->
<div id="round-announce">
  <div class="announce-text" id="announce-text">ROUND 1</div>
</div>

<!-- ══ GAME OVER ══ -->
<div id="gameover" class="screen">
  <div class="go-icon" id="go-icon">🏆</div>
  <div class="go-result" id="go-result">KO!</div>
  <div class="go-score" id="go-score">Score: <span id="final-score">0</span></div>
  <button class="btn-restart" id="btn-restart">FIGHT AGAIN</button>
</div>

<script>
// ── CURSOR ──
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
document.addEventListener('mousedown', () => cursor.style.transform = 'translate(-50%,-50%) scale(0.7) rotate(-30deg)');
document.addEventListener('mouseup', () => cursor.style.transform = 'translate(-50%,-50%) scale(1) rotate(0deg)');

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-restart').addEventListener('click', startGame);

// ── GAME STATE ──
let G = {};

function initState() {
  G = {
    running: false,
    playerX: 20,       // % from left
    enemyX: 75,        // % from left
    playerHP: 100,
    enemyHP: 100,
    playerMaxHP: 100,
    enemyMaxHP: 100,
    score: 0,
    combo: 0,
    comboTimer: null,
    stamina: 100,
    maxStamina: 100,
    round: 1,
    maxRounds: 3,
    roundTime: 60,
    timer: 60,
    timerInterval: null,
    blocking: false,
    playerState: 'idle',   // idle, punch, block, hurt, ko
    enemyState: 'idle',
    enemyDir: 1,
    enemyActionTimer: 0,
    enemyAttackCooldown: 0,
    keys: {},
    punchCooldown: 0,
    animFrame: null,
  };
}

// ── RING CANVAS ──
function drawRing() {
  const canvas = document.getElementById('ring-canvas');
  const W = canvas.width = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;
  const ctx = canvas.getContext('2d');

  // Floor boards
  ctx.strokeStyle = 'rgba(140,100,40,0.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 20; i++) {
    const y = H * 0.6 + i * 8;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Center circle
  ctx.strokeStyle = 'rgba(180,140,60,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(W/2, H * 0.72, 60, 0, Math.PI*2);
  ctx.stroke();

  // Center line
  ctx.strokeStyle = 'rgba(180,140,60,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2, H*0.55); ctx.lineTo(W/2, H*0.85); ctx.stroke();
}

window.addEventListener('resize', drawRing);

// ── ANNOUNCE ──
function announce(text, duration, cb) {
  const el = document.getElementById('round-announce');
  const txt = document.getElementById('announce-text');
  txt.textContent = text;
  el.classList.add('show');
  setTimeout(() => {
    el.classList.remove('show');
    if (cb) cb();
  }, duration);
}

// ── START GAME ──
function startGame() {
  initState();
  showScreen('game');
  drawRing();
  updateHUD();

  setTimeout(() => {
    announce('ROUND ' + G.round, 1500, () => {
      G.running = true;
      startRoundTimer();
      gameLoop();
    });
  }, 200);
}

// ── TIMER ──
function startRoundTimer() {
  G.timer = G.roundTime;
  clearInterval(G.timerInterval);
  G.timerInterval = setInterval(() => {
    G.timer--;
    const m = Math.floor(G.timer / 60);
    const s = G.timer % 60;
    document.getElementById('timer-display').textContent = m + ':' + String(s).padStart(2,'0');
    if (G.timer <= 0) endRound();
  }, 1000);
}

function endRound() {
  clearInterval(G.timerInterval);
  G.running = false;
  cancelAnimationFrame(G.animFrame);

  if (G.round >= G.maxRounds) {
    setTimeout(endGame, 500);
    return;
  }

  // Recover some HP between rounds
  G.playerHP = Math.min(G.playerMaxHP, G.playerHP + 20);
  G.enemyHP = Math.min(G.enemyMaxHP, G.enemyHP + 20);
  G.round++;

  announce('END OF ROUND', 1200, () => {
    setTimeout(() => {
      announce('ROUND ' + G.round, 1500, () => {
        G.running = true;
        startRoundTimer();
        gameLoop();
      });
    }, 400);
  });
}

// ── INPUT ──
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  keys[e.code] = true;
  if (!G.running) return;

  if (e.code === 'Space') { e.preventDefault(); G.blocking = true; }
  if (['j','k','l'].includes(e.key.toLowerCase())) {
    doPlayerPunch(e.key.toLowerCase());
  }
  // Prevent scroll
  if (['Space','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  keys[e.code] = false;
  if (e.code === 'Space') G.blocking = false;
});

// ── PUNCH ──
const PUNCHES = {
  j: { name:'JAB',      dmg:8,  cost:10, color:'#FF9900', emoji:'💥' },
  k: { name:'HOOK',     dmg:15, cost:20, color:'#FF3300', emoji:'💢' },
  l: { name:'UPPERCUT', dmg:22, cost:30, color:'#FFD700', emoji:'⚡' },
};

function doPlayerPunch(key) {
  if (!G.running) return;
  if (G.punchCooldown > 0) return;
  const p = PUNCHES[key];
  if (!p) return;
  if (G.stamina < p.cost) return;

  G.stamina -= p.cost;
  G.punchCooldown = 18;

  // Check range
  const dist = Math.abs(G.playerX - G.enemyX);
  if (dist < 28) {
    let dmg = p.dmg;
    if (G.enemyState === 'block') dmg = Math.floor(dmg * 0.2);

    G.enemyHP = Math.max(0, G.enemyHP - dmg);
    G.score += dmg * (G.combo + 1);

    G.combo++;
    clearTimeout(G.comboTimer);
    G.comboTimer = setTimeout(() => { G.combo = 0; showCombo(); }, 1500);

    showHitEffect(p.emoji, p.color, 'enemy');
    showCombo();
    setFighterState('enemy', 'hurt', 300);

    if (G.enemyHP <= 0) { triggerKO('player'); return; }
  }

  setFighterState('player', 'punch', 200);
  updateHUD();
}

function enemyPunch() {
  if (!G.running) return;
  if (G.enemyAttackCooldown > 0) return;

  const dist = Math.abs(G.playerX - G.enemyX);
  if (dist > 28) return;

  const moves = ['j','k','l'];
  const key = moves[Math.floor(Math.random() * moves.length)];
  const p = PUNCHES[key];
  let dmg = p.dmg;
  if (G.blocking) dmg = Math.floor(dmg * 0.15);

  G.playerHP = Math.max(0, G.playerHP - dmg);
  G.enemyAttackCooldown = 50 + Math.floor(Math.random() * 40);

  showHitEffect(G.blocking ? '🛡️' : p.emoji, G.blocking ? '#88CCFF' : '#FF3300', 'player');
  setFighterState('enemy', 'punch', 200);
  if (!G.blocking) setFighterState('player', 'hurt', 300);

  if (G.playerHP <= 0) { triggerKO('enemy'); return; }
  updateHUD();
}

// ── KO ──
function triggerKO(winner) {
  G.running = false;
  clearInterval(G.timerInterval);
  cancelAnimationFrame(G.animFrame);

  // Flash
  const flash = document.getElementById('ko-flash');
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 150);

  if (winner === 'player') {
    setFighterState('enemy', 'ko', 9999);
    announce('K  O  !', 2000, () => {
      G.round < G.maxRounds ? (() => {
        G.enemyHP = G.enemyMaxHP;
        G.round++;
        setTimeout(() => {
          announce('ROUND ' + G.round, 1500, () => {
            G.running = true;
            startRoundTimer();
            gameLoop();
          });
        }, 500);
      })() : endGame();
    });
  } else {
    setFighterState('player', 'ko', 9999);
    announce('K  O  !', 2000, () => endGame());
  }
}

function endGame() {
  clearInterval(G.timerInterval);
  cancelAnimationFrame(G.animFrame);

  const playerWon = G.playerHP > G.enemyHP;
  const result = document.getElementById('go-result');
  const icon = document.getElementById('go-icon');

  if (playerWon) {
    result.textContent = 'YOU WIN!';
    result.className = 'go-result win';
    icon.textContent = '🏆';
  } else {
    result.textContent = 'KO\'D OUT';
    result.className = 'go-result lose';
    icon.textContent = '💀';
  }

  document.getElementById('final-score').textContent = G.score.toLocaleString();
  document.getElementById('go-score').innerHTML = `Score: <span>${G.score.toLocaleString()}</span>`;
  showScreen('gameover');
}

// ── FIGHTER STATES ──
const SPRITES = {
  player: { idle:'🥊', punch:'👊', block:'🛡️', hurt:'😵', ko:'💀' },
  enemy:  { idle:'🤜', punch:'👊', block:'🛡️', hurt:'😵', ko:'💀' },
};
function setFighterState(who, state, dur) {
  G[who === 'player' ? 'playerState' : 'enemyState'] = state;
  const sprite = document.getElementById(who + '-sprite');
  sprite.textContent = SPRITES[who][state] || SPRITES[who].idle;
  if (dur < 9999) {
    setTimeout(() => {
      if (G[who === 'player' ? 'playerState' : 'enemyState'] === state) {
        G[who === 'player' ? 'playerState' : 'enemyState'] = 'idle';
        sprite.textContent = SPRITES[who].idle;
      }
    }, dur);
  }
}

// ── HIT EFFECT ──
function showHitEffect(emoji, color, target) {
  const arena = document.getElementById('arena');
  const el = document.createElement('div');
  el.className = 'hit-effect';
  el.textContent = emoji;
  el.style.color = color;
  const fighter = document.getElementById(target);
  const rect = fighter.getBoundingClientRect();
  const arenaRect = arena.getBoundingClientRect();
  el.style.left = (rect.left - arenaRect.left + rect.width/2) + 'px';
  el.style.top  = (rect.top  - arenaRect.top  + rect.height/3) + 'px';
  arena.appendChild(el);
  setTimeout(() => el.remove(), 600);
}

// ── COMBO DISPLAY ──
function showCombo() {
  const el = document.getElementById('combo-display');
  if (G.combo > 1) {
    el.innerHTML = `<div class="combo-text">${G.combo}x COMBO!</div>`;
  } else {
    el.innerHTML = '';
  }
}

// ── HUD ──
function updateHUD() {
  document.getElementById('player-health-bar').style.width = G.playerHP + '%';
  document.getElementById('enemy-health-bar').style.width = G.enemyHP + '%';
  document.getElementById('round-display').textContent = 'ROUND ' + G.round;
  document.getElementById('score-val').textContent = G.score.toLocaleString();
  document.getElementById('stamina-bar').style.width = G.stamina + '%';
}

// ── AI ──
function updateEnemy(dt) {
  if (!G.running) return;
  G.enemyActionTimer -= dt;
  G.enemyAttackCooldown = Math.max(0, G.enemyAttackCooldown - 1);

  if (G.enemyActionTimer <= 0) {
    G.enemyActionTimer = 30 + Math.floor(Math.random() * 40);

    const dist = G.playerX - G.enemyX; // negative = player left of enemy
    if (Math.abs(dist) > 28) {
      // Move toward player
      G.enemyX += dist > 0 ? 2 : -2;
      G.enemyX = Math.max(10, Math.min(88, G.enemyX));
    } else {
      // In range — attack or dance
      const r = Math.random();
      if (r < 0.55) enemyPunch();
      else if (r < 0.7) {
        G.enemyX += (Math.random() > 0.5 ? 3 : -3);
        G.enemyX = Math.max(10, Math.min(88, G.enemyX));
      } else {
        setFighterState('enemy', 'block', 400);
      }
    }
    updateFighterPositions();
  }
}

function updateFighterPositions() {
  document.getElementById('player').style.left = G.playerX + '%';
  document.getElementById('enemy').style.right = (100 - G.enemyX - 8) + '%';
  document.getElementById('enemy').style.left = 'auto';
}

// ── GAME LOOP ──
let lastTime = 0;
function gameLoop(ts = 0) {
  if (!G.running) return;
  const dt = ts - lastTime;
  lastTime = ts;

  // Player movement
  if (keys['a'] || keys['arrowleft']) {
    G.playerX = Math.max(5, G.playerX - 0.4);
  }
  if (keys['d'] || keys['arrowright']) {
    G.playerX = Math.min(85, G.playerX + 0.4);
  }

  // Stamina regen
  if (!G.blocking) {
    G.stamina = Math.min(G.maxStamina, G.stamina + 0.15);
  }
  G.punchCooldown = Math.max(0, G.punchCooldown - 1);

  // Block sprite
  if (G.blocking && G.playerState !== 'hurt') {
    setFighterState('player', 'block', 50);
  }

  // Enemy AI
  updateEnemy(dt);
  updateHUD();
  updateFighterPositions();

  G.animFrame = requestAnimationFrame(gameLoop);
}

// ── TOUCH / MOBILE BUTTONS ──
// Quick mobile controls
const mobileBar = document.createElement('div');
mobileBar.style.cssText = `
  position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
  display:flex; gap:12px; z-index:200;
`;
['J JAB','K HOOK','L UPP'].forEach((label, i) => {
  const k = ['j','k','l'][i];
  const btn = document.createElement('button');
  btn.textContent = label;
  btn.style.cssText = `
    font-family:'Bebas Neue',cursive; font-size:16px; letter-spacing:2px;
    background:linear-gradient(135deg,#CC2200,#880000); color:#fff;
    border:1px solid rgba(255,80,0,0.5); border-radius:6px;
    padding:10px 18px; cursor:pointer;
    box-shadow:0 0 15px rgba(255,50,0,0.4);
    touch-action:manipulation;
  `;
  btn.addEventListener('touchstart', e => { e.preventDefault(); doPlayerPunch(k); });
  btn.addEventListener('click', () => doPlayerPunch(k));
  mobileBar.appendChild(btn);
});

const moveBar = document.createElement('div');
moveBar.style.cssText = `
  position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
  display:flex; gap:40px; z-index:200;
`;
[['◀ MOVE',false],['BLOCK 🛡️',null],['MOVE ▶',true]].forEach(([label, right]) => {
  const btn = document.createElement('button');
  btn.textContent = label;
  btn.style.cssText = `
    font-family:'Bebas Neue',cursive; font-size:14px; letter-spacing:2px;
    background:rgba(255,255,255,0.08); color:#fff;
    border:1px solid rgba(255,255,255,0.15); border-radius:6px;
    padding:8px 16px; cursor:pointer; touch-action:manipulation;
  `;
  if (right === null) {
    btn.addEventListener('touchstart', e => { e.preventDefault(); G.blocking = true; });
    btn.addEventListener('touchend', () => G.blocking = false);
    btn.addEventListener('mousedown', () => G.blocking = true);
    btn.addEventListener('mouseup', () => G.blocking = false);
  } else {
    const dir = right ? 1 : -1;
    let held = false;
    const move = () => { if (held && G.running) { G.playerX = Math.max(5, Math.min(85, G.playerX + dir * 0.6)); updateFighterPositions(); requestAnimationFrame(move); } };
    btn.addEventListener('touchstart', e => { e.preventDefault(); held = true; move(); });
    btn.addEventListener('touchend', () => held = false);
    btn.addEventListener('mousedown', () => { held = true; move(); });
    btn.addEventListener('mouseup', () => held = false);
  }
  moveBar.appendChild(btn);
});

document.getElementById('game').appendChild(mobileBar);
document.getElementById('game').appendChild(moveBar);
</script>
